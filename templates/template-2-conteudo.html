<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📅 Template 2: Planejador de Conteúdo Semanal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; color: #37352f; padding: 40px; max-width: 900px; margin: 0 auto; }
h1 { font-size: 32px; margin-bottom: 8px; }
h2 { font-size: 20px; margin: 24px 0 12px; color: #2eaadc; }
h3 { font-size: 16px; margin: 16px 0 8px; font-weight: 600; }
p, li { font-size: 14px; line-height: 1.6; }
ul { margin-left: 20px; margin-bottom: 12px; }
.callout { background: #f7f6f3; border-left: 4px solid #ea6c0a; padding: 16px; margin: 16px 0; border-radius: 0 4px 4px 0; }
.field { margin: 12px 0; }
.field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
.field input, .field textarea, .field select { width: 100%; padding: 8px 12px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 14px; }
.field textarea { min-height: 60px; }
.btn { display: inline-block; background: #ea6c0a; color: white; padding: 12px 24px; border-radius: 4px; text-decoration: none; font-weight: 500; margin: 8px 0; border: none; cursor: pointer; }
.btn:hover { background: #d55f09; }
.btn-sec { background: #666; }
.section { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px; margin: 16px 0; }
.day-card { background: #f7f6f3; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin: 12px 0; }
.day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.day-title { font-weight: 600; font-size: 16px; }
.day-type { background: #e8f4fd; color: #1976d2; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
.post-content { background: #fff; padding: 12px; border-radius: 4px; border: 1px solid #eee; }
.post-hook { font-weight: 600; color: #ea6c0a; margin-bottom: 8px; }
.post-caption { font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
.post-cta { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; font-size: 12px; color: #666; }
.post-hashtags { margin-top: 8px; font-size: 11px; color: #2eaadc; }
.emoji { font-size: 20px; }
</style>
</head>
<body>

<h1>📅 Planejador de Conteúdo Semanal</h1>
<p style="color: #666; margin-bottom: 24px;">Planeje uma semana de conteúdo em minutos. Preencha seu perfil uma vez e gere semanas inteiras.</p>

<div class="section">
<h2>⚙️ Seu Perfil de Conteúdo</h2>

<div class="field">
<label>🎯 Seu nicho (tema principal)</label>
<input type="text" id="nicho" placeholder="Ex: IA para Solopreneurs">
</div>

<div class="field">
<label>👥 Sua audiência (para quem você fala)</label>
<textarea id="audiencia" placeholder="Ex: Empreendedores solo que querem escalar"></textarea>
</div>

<div class="field">
<label>📱 Plataforma principal</label>
<select id="plataforma">
<option value="">Selecione...</option>
<option value="Instagram">Instagram</option>
<option value="LinkedIn">LinkedIn</option>
<option value="TikTok">TikTok</option>
<option value="Twitter">Twitter</option>
<option value="YouTube">YouTube</option>
</select>
</div>

<div class="field">
<label>🗣 Seu tom de voz</label>
<input type="text" id="tom" placeholder="Ex: Prático, direto, sem enrolação">
</div>

<div class="field">
<label>🏁 Sua oferta (o que vende ou promove)</label>
<textarea id="oferta" placeholder="Ex: Sistema de IA plug & play para negócios"></textarea>
</div>

<div class="field">
<label>🎯 Objetivo desta semana</label>
<select id="objetivo">
<option value="">Selecione...</option>
<option value="gerar leads">Gerar leads</option>
<option value="vender">Vender meu serviço</option>
<option value="engajar">Engajar audiência</option>
<option value="educar">Educar meu público</option>
<option value="construir autoridade">Construir autoridade</option>
</select>
</div>

<button class="btn" onclick="gerarSemana()">🚀 Gerar Semana de Conteúdo</button>
</div>

<div id="semana-gerada" style="display: none;">
<div class="section">
<h2>📆 Sua Semana de Conteúdo</h2>
<div id="conteudo-semana"></div>
<button class="btn" onclick="copiarSemana()">📋 Copiar Semana Inteira</button>
</div>
</div>

<div class="section">
<h2>📆 Calendário da Semana</h2>
<div id="calendario"></div>
</div>

<script>
const dias = [
{ dia: 'Segunda', tipo: 'Educativo', desc: 'Ensine algo útil do seu nicho' },
{ dia: 'Terça', tipo: 'Dica', desc: 'Conselho rápido e acionável' },
{ dia: 'Quarta', tipo: 'História', desc: 'Antes/depois ou aprendizado' },
{ dia: 'Quinta', tipo: 'Educativo', desc: 'Conteúdo mais profundo' },
{ dia: 'Sexta', tipo: 'Bastidores', desc: 'Humanize sua marca' },
{ dia: 'Sábado', tipo: 'Promo', desc: 'Menção leve da oferta' },
{ dia: 'Domingo', tipo: 'Engajamento', desc: 'Pergunta ou conteúdo relatable' }
];

const hooks = {
'Educativo': [
'Você sabia que [fato surpreendente]?',
'3 erros que [público] comete ao [problema]',
'Por que [técnica] não funciona para [público]?',
'A verdade sobre [mito] que ninguém conta'
],
'Dica': [
'Quick tip: [dica rápida]',
'Uma mudança que pode [resultado]',
'Faça isso hoje e [benefício]',
'Dica de 30 segundos: [dica]'
],
'História': [
'Como eu [conquista] em [tempo]',
'O que aprendi ao [experiência]',
'Minha jornada de [de] para [para]',
'Por que eu decidi [decisão]?'
],
'Bastidores': [
'Um dia na vida de [profissão]',
'Como eu trabalho (sem romantizar)',
'O que ninguém te conta sobre [tópico]',
'Reveal: [processo] real'
],
'Promo': [
'Agora sim, [oferta] está disponível',
'Última chamada para [oferta]',
'Novo: [lançamento]',
'Depois de [X] pedidos, [lançamento]'
],
'Engajamento': [
'Comenta aí o que você quer ver',
'Qual desses você prefere? 👇',
'Me conta: [pergunta]',
'Responde true ou false: [afirmação]'
]
};

const ctas = {
'Instagram': 'Comenta 👏 se curtiu!',
'LinkedIn': 'Comenta o que você acha',
'Twitter': 'Retweet se útil',
'TikTok': 'Salva pra não perder',
'YouTube': 'Inscreve-se e ative o sininho'
};

function gerarSemana() {
const nicho = document.getElementById('nicho').value || '[seu nicho]';
const audiencia = document.getElementById('audiencia').value || '[sua audiência]';
const plataforma = document.getElementById('plataforma').value || 'Instagram';
const tom = document.getElementById('tom').value || 'prático e direto';
const oferta = document.getElementById('oferta').value || '[sua oferta]';
const objetivo = document.getElementById('objetivo').value || 'gerar valor';

let html = '';
const hoje = new Date();
const inicioSemana = new Date(hoje);
inicioSemana.setDate(hoje.getDate() - hoje.getDay() + 1);

dias.forEach((d, i) => {
const data = new Date(inicioSemana);
data.setDate(inicioSemana.getDate() + i);
const dataStr = data.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });

const hooksDia = hooks[d.tipo] || hooks['Educativo'];
const hook = hooksDia[Math.floor(Math.random() * hooksDia.length)];
const caption = `🎯 ${hook.replace('[fato surpreendente]', 'essa técnica').replace('[público]', 'empreendedores').replace('[problema]', 'vender mais').replace('[técnica]', 'estratégia complexa').replace('[mito]', 'sucesso overnight').replace('[dica rápida]', 'faz isso antes de criar conteúdo').replace('[resultado]', 'triplicar seu alcance').replace('[benefício]', 'vai agradecer').replace('[dica]', 'anota aí').replace('[conquista]', 'consegui meus primeiros clientes').replace('[experiência]', 'lançar meu primeiro produto').replace('[experiência]', 'trabalhar com clientes').replace('[decisão]', 'focar em produto digital').replace('[profissão]', 'criador de conteúdo').replace('[processo]', 'criação de conteúdo').replace('[lançamento]', 'sistema').replace('[oferta]', 'meu sistema').replace('[X]', '50')}

💡 ${d.desc}

${audiencia}, aqui vai:

1. [Ponto 1]
2. [Ponto 2]
3. [Ponto 3]

${objetivo === 'vender' ? `🎁 ${oferta}` : ''}

${ctas[plataforma] || 'Comenta!'}

#${nicho.replace(/ /g, '')} #${d.tipo.toLowerCase()} #conteúdo #${plataforma.toLowerCase()}`;

html += `
<div class="day-card">
<div class="day-header">
<span class="day-title">${dataStr} — ${d.dia}</span>
<span class="day-type">${d.tipo}</span>
</div>
<div class="post-content">
<div class="post-hook">${hook}</div>
<div class="post-caption">${caption}</div>
<div class="post-cta">CTA: ${ctas[plataforma] || 'Comenta!'}</div>
<div class="post-hashtags">#${nicho.replace(/ /g, '')} #${d.tipo.toLowerCase()} #conteúdo</div>
</div>
</div>`;
});

document.getElementById('conteudo-semana').innerHTML = html;
document.getElementById('semana-gerada').style.display = 'block';
}

function copiarSemana() {
const conteudo = document.getElementById('conteudo-semana').innerText;
navigator.clipboard.writeText(conteudo);
alert('Semana copiada!');
}
</script>

</body>
</html>
